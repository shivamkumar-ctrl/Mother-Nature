kind = "web"
previewPath = "/"
title = "Bloom & Root Nursery"
version = "1.0.0"
id = "artifacts/nursery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23555

[services.development]
run = "pnpm --filter @workspace/nursery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nursery", "run", "build" ]
publicDir = "artifacts/nursery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23555"
BASE_PATH = "/"
